<!doctype html>
<html lang="{{LANG}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
:root {
  --paper: #f4f2ed;
  --surface: #fbfaf6;
  --ink: #101010;
  --muted: #66635e;
  --line: #d3d0c7;
  --accent: #545f80;
  --accent-2: #a06f58;
  --haze: #d8dbea;
  --max: 1200px;
  --gutter: clamp(22px, 3.6vw, 48px);
  --hairline: color-mix(in srgb, var(--ink) 8%, transparent);
  --rule: color-mix(in srgb, var(--ink) 12%, transparent);
  --soft-rule: color-mix(in srgb, var(--ink) 7%, transparent);
  --reader-ink: color-mix(in srgb, var(--ink) 84%, var(--muted));
  --deep: color-mix(in srgb, var(--ink) 94%, var(--accent) 6%);
  --wash: color-mix(in srgb, var(--haze) 26%, var(--surface));
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  --display: "Avenir Next", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  --sans: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  --serif: Charter, Georgia, "Times New Roman", "Songti SC", "SimSun", serif;
  --cjk-serif: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "STSong", "SimSun", Georgia, serif;
  --quote-mark: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; margin: 0; }
html { scroll-behavior: smooth; }
body {
  color: var(--ink);
  background: linear-gradient(180deg, color-mix(in srgb, var(--paper) 96%, #fff), var(--paper));
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-kerning: normal;
  text-rendering: optimizeLegibility;
  overflow-wrap: break-word;
  overflow-x: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; opacity: .16;
  background: linear-gradient(180deg, rgba(255,255,255,.36), transparent 24rem);
}
a {
  color: color-mix(in srgb, var(--accent) 82%, var(--ink));
  text-decoration-thickness: 1px;
  text-decoration-color: color-mix(in srgb, var(--accent) 42%, transparent);
  text-underline-offset: .18em;
}
a:hover { color: var(--deep); text-decoration-color: currentColor; }

.page {
  width: min(var(--max), calc(100vw - 24px));
  margin: clamp(16px, 2.4vw, 38px) auto;
  min-height: 100vh; position: relative;
  background:
    linear-gradient(180deg, var(--surface), var(--paper) 17rem);
  box-shadow: 0 22px 70px rgba(20,22,24,.08), inset 0 0 0 1px rgba(255,255,255,.48);
  overflow: hidden;
}

/* ── Hero (compact technical) ── */
.hero {
  padding: clamp(22px, 2.6vw, 34px) var(--gutter) clamp(22px, 3vw, 34px);
  display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); gap: 18px;
  grid-template-rows: auto 1fr auto;
  position: relative; z-index: 1;
  border-bottom: 1px solid var(--soft-rule);
  min-height: clamp(500px, 66vh, 640px);
  align-content: stretch;
}
.brand-row {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
  font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0;
  color: var(--muted); padding-bottom: 16px;
}
.brand { display: inline-flex; align-items: center; gap: 8px; color: var(--ink); }
.brand-mark { display: none !important; }
.hero-main { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); gap: clamp(28px, 4vw, 52px); align-items: start; align-self: start; padding-top: clamp(28px, 5vw, 64px); }
h1 {
  grid-column: 1 / 7; font-family: var(--display); font-size: clamp(48px, 5.8vw, 72px); line-height: 1.06; font-weight: 800;
  max-inline-size: min(100%, 10.8em); text-wrap: balance; letter-spacing: 0; color: var(--deep); overflow-wrap: anywhere;
}
.hero-deck { grid-column: 7 / 11; display: grid; gap: 14px; align-content: start; align-self: start; justify-self: stretch; max-inline-size: 31rem; padding-top: 4px; }
.subtitle { font-size: 28px; line-height: 1.16; color: var(--reader-ink); text-wrap: balance; letter-spacing: 0; overflow-wrap: anywhere; }
.lead { max-inline-size: 31rem; font-family: var(--serif); font-size: 16px; line-height: 1.66; color: var(--muted); text-wrap: pretty; overflow-wrap: anywhere; }
.thesis {
  max-inline-size: 31rem;
  padding: 2px 0 0;
  font-size: 13px; line-height: 1.55; color: var(--reader-ink); overflow-wrap: anywhere;
}
.thesis span { display: block; margin-bottom: 6px; font-family: var(--mono); font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 0; }
.hero-meta {
  display: none !important;
}
.meta-item { padding: 12px 14px 13px 0; margin-right: 14px; border-right: 1px solid var(--hairline); }
.meta-item:last-child { border-right: 0; }
.meta-item span { display: block; font-family: var(--mono); font-size: 9px; text-transform: uppercase; color: var(--muted); letter-spacing: 0; }
.meta-item strong { display: block; margin-top: 7px; font-size: 13px; line-height: 1.38; font-weight: 620; color: var(--reader-ink); }
.hero-findings {
  grid-column: 1 / -1; display: grid; grid-template-columns: .88fr repeat(4, minmax(0, 1fr));
  gap: clamp(18px, 2.4vw, 34px); margin-top: clamp(20px, 4vw, 52px); padding-top: 18px;
  align-self: end; border-top: 1px solid var(--soft-rule); background: transparent;
}
.hero-findings > p {
  padding: 4px 16px 10px 0; font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  color: var(--accent); letter-spacing: 0;
}
.hero-finding { min-height: 62px; padding: 4px 0 10px; display: grid; align-content: start; gap: 8px; }
.hero-finding span { font-family: var(--mono); font-size: 11px; color: var(--accent); font-variant-numeric: tabular-nums; }
.hero-finding strong { display: block; font-size: 13px; line-height: 1.18; font-weight: 680; color: var(--deep); text-wrap: balance; }

/* ── Report Sections (8-col reading + 2-col evidence margin) ── */
.report-section {
  display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); gap: 22px;
  padding: clamp(50px, 6vw, 76px) var(--gutter) clamp(42px, 5.2vw, 64px); border-top: 1px solid var(--soft-rule);
  position: relative; z-index: 1;
}
.section-kicker { grid-column: 1 / 3; font-family: var(--mono); font-size: 10px; color: var(--accent); text-transform: uppercase; padding-top: 8px; letter-spacing: 0; }
.section-body {
  grid-column: 3 / 9;
  min-width: 0;
  --content-size: 17px;
  --content-leading: 1.74;
  --content-gap: 16px;
  --list-size: 16px;
  --list-leading: 1.7;
  --list-gap: 7px;
  --block-gap: 24px;
  --quote-size: 16.5px;
  --quote-leading: 1.76;
}
.section-body h2 { font-family: var(--display); font-size: 42px; line-height: 1.02; font-weight: 760; text-wrap: balance; margin-bottom: 18px; letter-spacing: 0; color: var(--deep); overflow-wrap: anywhere; }
.section-body h3 { font-size: 18px; line-height: 1.3; font-weight: 620; color: var(--reader-ink); margin: 28px 0 10px; }
.section-body p { font-family: var(--serif); font-size: var(--content-size); line-height: var(--content-leading); color: var(--reader-ink); margin-bottom: var(--content-gap); text-wrap: pretty; overflow-wrap: anywhere; }
.section-lede { font-family: var(--sans) !important; font-size: 18px !important; line-height: 1.52 !important; color: var(--muted) !important; }
.section-body p:last-child { margin-bottom: 0; }
.section-body h4 { margin: 24px 0 10px; font-size: 15px; line-height: 1.35; font-weight: 680; color: var(--deep); }
.section-body p + h3,
.section-body ul + h3,
.section-body ol + h3,
.section-body blockquote + h3,
.section-body pre + h3,
.section-body table + h3 { margin-top: 34px; }
.section-body p + ul,
.section-body p + ol { margin-top: -4px; }
.section-body ul:not(.findings-list):not(.point-list),
.section-body ol:not(.findings-list):not(.point-list) {
  margin: 0 0 18px;
  padding-left: 1.35em;
  font-family: var(--serif);
  font-size: var(--list-size);
  line-height: var(--list-leading);
  color: color-mix(in srgb, var(--ink) 82%, var(--muted));
}
.section-body li { margin: 0 0 var(--list-gap); padding-left: 2px; }
.section-body li:last-child { margin-bottom: 0; }
.section-body li > p {
  margin: 5px 0 7px;
  font-size: inherit;
  line-height: inherit;
}
.section-body li > p:first-child { margin-top: 0; }
.section-body li > p:last-child { margin-bottom: 0; }
.section-body li > ul,
.section-body li > ol {
  margin-top: 8px !important;
  margin-bottom: 10px !important;
  font-size: .96em !important;
}
.section-body ul ul { list-style-type: circle; }
.section-body ul ul ul { list-style-type: square; }
.section-body ol ol { list-style-type: lower-alpha; }
.section-body ol ol ol { list-style-type: lower-roman; }
.section-body ul.contains-task-list {
  padding-left: 0;
  list-style: none;
}
.section-body li.task-list-item {
  list-style: none;
  padding-left: 0;
}
.section-body input[type="checkbox"] {
  width: .95em;
  height: .95em;
  margin: 0 .5em 0 0;
  accent-color: var(--accent);
  transform: translateY(.12em);
}
.section-body blockquote {
  position: relative;
  display: grid;
  grid-template-columns: 24px minmax(0, 1fr) 26px;
  column-gap: 16px;
  margin: 18px 0 20px;
  padding: 16px 20px;
  border: 0;
  background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 78%, var(--haze)), color-mix(in srgb, var(--paper) 76%, var(--surface)));
  color: color-mix(in srgb, var(--ink) 76%, var(--muted));
  box-shadow: none;
}
.section-body blockquote::before,
.section-body blockquote::after {
  display: block;
  font-family: var(--quote-mark);
  font-size: 42px;
  line-height: .9;
  font-weight: 580;
  color: color-mix(in srgb, var(--accent) 36%, transparent);
  pointer-events: none;
}
.section-body blockquote::before {
  content: "“";
  grid-column: 1;
  grid-row: 1 / span 2;
  justify-self: start;
  align-self: start;
  margin-top: -3px;
}
.section-body blockquote::after {
  content: "”";
  grid-column: 3;
  grid-row: 1 / span 2;
  justify-self: end;
  align-self: end;
  margin-bottom: -5px;
}
.section-body blockquote p {
  grid-column: 2;
  position: relative;
  z-index: 1;
  margin-bottom: 10px;
  font-size: var(--quote-size);
  line-height: var(--quote-leading);
  color: color-mix(in srgb, var(--ink) 76%, var(--muted));
}
.section-body blockquote p:last-child { margin-bottom: 0; }
.section-body hr {
  height: 0;
  margin: 32px 0;
  border: 0;
  border-top: 1px solid var(--hairline);
}
.section-body blockquote + hr { margin: 18px 0 24px; }
.section-body :not(pre) > code,
.figure-body :not(pre) > code,
.section-body kbd,
.figure-body kbd {
  font-family: var(--mono);
  font-size: .86em;
  padding: .12em .34em;
  border: 1px solid color-mix(in srgb, var(--ink) 10%, transparent);
  background: color-mix(in srgb, var(--haze) 24%, transparent);
  color: color-mix(in srgb, var(--ink) 88%, var(--accent));
}
.code-block {
  position: relative;
  margin: 24px 0;
}
.section-body pre,
.figure-body pre {
  margin: 22px 0;
  padding: 24px 56px 24px 24px;
  overflow-x: auto;
  border-top: 2px solid color-mix(in srgb, var(--accent) 68%, var(--ink));
  border-bottom: 1px solid var(--hairline);
  background: color-mix(in srgb, var(--surface) 88%, var(--paper));
  color: color-mix(in srgb, var(--ink) 86%, var(--muted));
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.72;
  white-space: pre;
  box-shadow:
    inset 0 1px 0 color-mix(in srgb, #fff 68%, transparent),
    inset 0 -1px 0 color-mix(in srgb, var(--ink) 4%, transparent);
}
.code-block pre {
  margin: 0;
}
.section-body pre code,
.figure-body pre code {
  padding: 0;
  border: 0;
  background: transparent;
  color: inherit;
  font-size: inherit;
}
.code-copy {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 2;
  display: inline-grid;
  place-items: center;
  width: 30px;
  height: 30px;
  padding: 0;
  border: 1px solid color-mix(in srgb, var(--ink) 10%, transparent);
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  color: color-mix(in srgb, var(--accent) 82%, var(--ink));
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(20,22,24,.06);
}
.code-copy:hover {
  border-color: color-mix(in srgb, var(--accent) 38%, transparent);
  color: var(--deep);
  background: color-mix(in srgb, var(--surface) 96%, #fff);
}
.code-copy:focus-visible {
  outline: 2px solid color-mix(in srgb, var(--accent) 42%, transparent);
  outline-offset: 2px;
}
.code-copy svg {
  width: 15px;
  height: 15px;
  stroke: currentColor;
}
.code-copy .check-icon { display: none; }
.code-copy[data-copied="true"] {
  color: color-mix(in srgb, var(--accent-2) 78%, var(--ink));
  border-color: color-mix(in srgb, var(--accent-2) 36%, transparent);
}
.code-copy[data-copied="true"] .copy-icon { display: none; }
.code-copy[data-copied="true"] .check-icon { display: block; }
.section-body img {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 24px 0;
  border: 1px solid var(--hairline);
}
.section-body mark {
  padding: .05em .24em;
  background: color-mix(in srgb, var(--accent-2) 24%, transparent);
  color: var(--ink);
}
.evidence-margin { grid-column: 9 / 11; display: grid; align-content: start; gap: 14px; min-width: 0; }
.evidence-note,
.side-note {
  padding: 13px 0 14px 14px;
  border-left: 2px solid color-mix(in srgb, var(--accent) 86%, var(--ink));
  border-top: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  font-family: var(--sans); font-size: 12px; line-height: 1.58; color: var(--muted);
  background:
    linear-gradient(90deg, color-mix(in srgb, var(--haze) 28%, transparent), transparent 72%),
    color-mix(in srgb, var(--surface) 62%, transparent);
}
.evidence-note strong {
  display: block; font-family: var(--mono); font-size: 10px; line-height: 1.25;
  text-transform: uppercase; color: var(--accent); margin-bottom: 7px;
}
.evidence-note p,
.side-note p { font-family: var(--sans); font-size: 12px; line-height: 1.58; margin: 0 0 8px; }
.evidence-note p:last-child,
.side-note p:last-child { margin-bottom: 0; }
.evidence-tag { display: inline-block; padding: 2px 8px; font-family: var(--mono); font-size: 9px; color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 32%, transparent); text-transform: uppercase; }

/* ── Figures (full-width technical plates) ── */
.report-figure {
  display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); gap: 22px;
  padding: clamp(40px, 5vw, 58px) var(--gutter) clamp(46px, 5vw, 66px); border-top: 1px solid var(--hairline);
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--haze) 18%, transparent), color-mix(in srgb, var(--surface) 56%, transparent)),
    color-mix(in srgb, var(--paper) 72%, var(--surface));
  box-shadow: inset 0 1px 0 var(--hairline), inset 0 -1px 0 color-mix(in srgb, var(--ink) 5%, transparent);
  position: relative; z-index: 1;
}
.report-figure figcaption { grid-column: 1 / 3; min-width: 0; }
.report-figure figcaption span { display: block; font-family: var(--mono); font-size: 9px; color: var(--accent); text-transform: uppercase; }
.report-figure figcaption strong { display: block; margin-top: 12px; font-size: clamp(19px, 1.8vw, 22px); line-height: 1.14; font-weight: 720; letter-spacing: 0; }
.report-figure figcaption p { margin-top: 10px; font-size: 12px; line-height: 1.55; color: var(--muted); }
.figure-body { grid-column: 3 / 11; min-width: 0; }

/* ── Diagrams (technical treatment: precise, labeled, dense) ── */
.flow-diagram {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0;
  border-top: 2px solid var(--ink); border-bottom: 1px solid var(--hairline);
}
.flow-node {
  padding: 18px 14px; display: grid; gap: 22px; position: relative;
  border-right: 1px solid var(--hairline); background: var(--surface);
}
.flow-node:last-child { border-right: 0; }
.flow-node::after { display: none; }
.flow-node:last-child::after { display: none; }
.flow-node span { font-family: var(--mono); font-size: 10px; color: var(--accent); text-transform: uppercase; }
.flow-node strong { font-size: 16px; line-height: 1.18; }

.architecture-diagram { padding: 24px 0 0; }
.arch-vine { display: block; width: 100%; height: 86px; margin-bottom: -8px; }
.arch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0; border: 1px solid var(--hairline); }
.arch-group { padding: 20px; border-right: 1px solid var(--hairline); background: var(--surface); }
.arch-group:last-child { border-right: 0; }
.arch-group span { font-family: var(--mono); font-size: 9px; color: var(--accent); text-transform: uppercase; }
.arch-group h3 { margin: 12px 0 16px; font-size: 20px; line-height: 1.05; }
.arch-group ul { list-style: none; padding: 0; }
.arch-group li { padding: 7px 0; border-top: 1px solid var(--hairline); font-size: 13px; color: color-mix(in srgb, var(--ink) 76%, var(--muted)); line-height: 1.35; }
.arch-group li::before { content: "- "; color: var(--muted); }

.timeline-diagram {
  display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0;
  border-top: 2px solid color-mix(in srgb, var(--accent) 82%, var(--ink));
  border-bottom: 1px solid var(--hairline);
  background: color-mix(in srgb, var(--surface) 74%, transparent);
}
.timeline-item {
  position: relative;
  min-height: 142px;
  padding: 22px 20px 18px;
  border-right: 1px solid var(--hairline);
}
.timeline-item:last-child { border-right: 0; }
.timeline-item::before {
  content: "";
  position: absolute;
  top: -2px;
  left: 20px;
  width: 32px;
  height: 2px;
  background: var(--accent);
}
.timeline-item span { font-family: var(--mono); font-size: 10px; color: var(--accent); text-transform: uppercase; }
.timeline-item strong { display: block; margin-top: 8px; font-size: 16px; line-height: 1.2; }
.timeline-item p { color: var(--muted); font-size: 12px; line-height: 1.4; margin-top: 5px; }

.table-wrap,
.matrix-wrap {
  overflow-x: auto;
  max-width: 100%;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
  scrollbar-gutter: stable;
  border-top: 2px solid color-mix(in srgb, var(--accent) 72%, var(--ink));
  border-bottom: 1px solid var(--hairline);
  background: color-mix(in srgb, var(--surface) 72%, transparent);
  box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 58%, transparent);
}
.section-body table,
.figure-body table,
.matrix-wrap table,
.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  min-width: 720px;
}
.section-body table,
.figure-body table { margin: 24px 0; }
.matrix-wrap table,
.table-wrap table { margin: 0; }
.section-body th,
.section-body td,
.figure-body th,
.figure-body td,
.matrix-wrap th,
.matrix-wrap td,
.table-wrap th,
.table-wrap td {
  text-align: left; vertical-align: top;
  padding: 15px 18px;
  border-bottom: 1px solid var(--hairline);
  font-size: 13px; line-height: 1.5;
  color: color-mix(in srgb, var(--ink) 78%, var(--muted));
}
.section-body thead th,
.figure-body thead th,
.matrix-wrap thead th,
.table-wrap thead th {
  font-family: var(--sans); font-size: 13px; line-height: 1.42; font-weight: 680;
  text-transform: none; color: color-mix(in srgb, var(--accent) 72%, var(--ink));
  background: transparent;
}
.section-body tbody th,
.figure-body tbody th,
.matrix-wrap tbody th,
.table-wrap tbody th {
  width: 20%; font-size: 15px; line-height: 1.3; font-weight: 680; color: var(--deep);
}
.section-body tr:last-child th,
.section-body tr:last-child td,
.figure-body tr:last-child th,
.figure-body tr:last-child td,
.matrix-wrap tr:last-child th,
.matrix-wrap tr:last-child td,
.table-wrap tr:last-child th,
.table-wrap tr:last-child td { border-bottom: 0; }
.section-body table caption,
.figure-body table caption,
.matrix-wrap caption,
.table-wrap caption {
  caption-side: bottom; padding-top: 10px; text-align: left;
  font-family: var(--mono); font-size: 10px; line-height: 1.4; color: var(--muted);
}

.decision-map { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1px; background: var(--hairline); }
.decision-node { padding: 18px 16px; background: var(--surface); }
.decision-node span { font-family: var(--mono); font-size: 10px; color: var(--accent); text-transform: uppercase; }
.decision-node strong { display: block; margin-top: 8px; font-size: 16px; line-height: 1.18; }
.decision-node p { color: var(--muted); font-size: 12px; line-height: 1.4; margin-top: 6px; }

/* ── Findings list ── */
.findings-list {
  padding: 8px 0 10px; list-style: none;
}
.findings-list li {
  display: grid; grid-template-columns: 42px 1fr; gap: 14px;
  padding: 16px 0; border-bottom: 1px solid var(--hairline);
}
.findings-list li:first-child { border-top: 1px solid var(--hairline); }
.findings-num { font-family: var(--mono); font-size: 18px; color: var(--accent); font-weight: 620; text-align: right; }
.findings-list strong { display: block; font-size: 16px; line-height: 1.2; margin-bottom: 4px; }
.findings-list p { font-size: 14px; line-height: 1.5; color: var(--muted); }
.point-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
.point-list li { display: grid; grid-template-columns: 32px 1fr; gap: 10px; padding: 10px 0; border-top: 1px solid var(--soft-rule); }
.point-list span { font-family: var(--mono); color: var(--accent); font-size: 10px; padding-top: 3px; }
.point-list p { font-family: var(--sans); margin: 0; font-size: 12px; line-height: 1.45; color: var(--muted); }
.report-quote {
  padding: clamp(42px, 5vw, 68px) var(--gutter);
  display: grid; grid-template-columns: repeat(10, minmax(0, 1fr)); gap: 22px;
  border-top: 1px solid var(--hairline); background: color-mix(in srgb, var(--surface) 68%, var(--haze));
}
.report-quote blockquote { grid-column: 3 / 10; font-family: var(--display); font-size: 42px; line-height: 1.06; font-weight: 740; letter-spacing: 0; color: var(--deep); text-wrap: balance; }
.report-quote cite { grid-column: 3 / 10; font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; font-style: normal; letter-spacing: 0; }

/* ── Closing ── */
.closing {
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px;
  padding: 42px var(--gutter) 52px;
  position: relative; z-index: 1;
}
.closing-list { padding-top: 0; }
.closing-list h3 { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--muted); }
.closing-list ul { margin: 12px 0 0; padding-left: 16px; font-size: 13px; line-height: 1.5; color: color-mix(in srgb, var(--ink) 76%, var(--muted)); }

footer {
  margin: 0 var(--gutter); padding: 16px 0 24px; display: flex; justify-content: space-between;
  border-top: 1px solid var(--hairline); position: relative; z-index: 1;
  font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--muted);
}

/* ── Chinese ── */
html[lang^="zh"] body {
  --display: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --sans: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --serif: var(--cjk-serif);
  font-family: var(--sans);
}
html[lang^="zh"] h1 {
  max-inline-size: min(100%, 8.6em);
  font-size: clamp(46px, 5vw, 64px);
  line-height: 1.08;
  font-weight: 720;
  word-break: normal;
  overflow-wrap: anywhere;
  line-break: strict;
}
html[lang^="zh"] .subtitle { font-size: 24px; line-height: 1.34; }
html[lang^="zh"] .lead { line-height: 1.78; }
html[lang^="zh"] .thesis { line-height: 1.68; }
html[lang^="zh"] .hero-finding strong { font-size: 14px; line-height: 1.36; }
html[lang^="zh"] .section-body {
  --content-size: 16.5px;
  --content-leading: 1.82;
  --content-gap: 16px;
  --list-size: 16px;
  --list-leading: 1.78;
  --list-gap: 6px;
  --quote-size: 15.5px;
  --quote-leading: 1.78;
}
html[lang^="zh"] .section-body h2 { font-size: 28px; line-height: 1.14; font-weight: 700; }
html[lang^="zh"] .section-body ul:not(.findings-list):not(.point-list),
html[lang^="zh"] .section-body ol:not(.findings-list):not(.point-list) {
  font-size: var(--list-size);
  line-height: var(--list-leading);
}
html[lang^="zh"] .report-figure figcaption strong { font-size: clamp(18px, 1.7vw, 21px); line-height: 1.22; }
html[lang^="zh"] .section-body p,
html[lang^="zh"] .lead,
html[lang^="zh"] .report-quote blockquote {
  font-variant-numeric: proportional-nums;
}
html[lang^="zh"] time,
html[lang^="zh"] code,
html[lang^="zh"] .hero-finding span,
html[lang^="zh"] .findings-num {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}
html[lang^="zh"] .section-body thead th,
html[lang^="zh"] .figure-body thead th,
html[lang^="zh"] .matrix-wrap thead th,
html[lang^="zh"] .table-wrap thead th {
  font-size: 14px;
  line-height: 1.48;
}

/* ── Responsive ── */
@media (max-width: 860px) {
  .hero-main, .report-section, .report-figure, .closing { grid-template-columns: 1fr; }
  h1, .hero-deck, .section-kicker, .section-body, .evidence-margin, .report-figure figcaption, .figure-body, .report-quote blockquote, .report-quote cite { grid-column: 1 / -1; }
  .hero { min-height: auto; }
  .hero-findings { grid-template-columns: 1fr 1fr; }
  .hero-findings > p { grid-column: 1 / -1; border-bottom: 1px solid var(--hairline); }
  h1 { font-size: 50px; line-height: 1.06; }
  html[lang^="zh"] h1 { font-size: 36px; line-height: 1.12; }
  .section-body h2 { font-size: 28px; }
  .arch-grid, .timeline-diagram, .decision-map { grid-template-columns: 1fr; }
  .timeline-item {
    min-height: auto;
    border-right: 0;
    border-bottom: 1px solid var(--hairline);
  }
  .timeline-item:last-child { border-bottom: 0; }
  .flow-node::after { display: none; }
}
@media (max-width: 520px) {
  html, body { width: 100%; max-width: 100vw; overflow-x: hidden; }
  .page { width: 100%; max-width: 100vw; margin: 0; border-left: 0; border-right: 0; }
  .hero, .report-section, .report-figure, .closing { padding-left: 18px; padding-right: 18px; }
  .hero-main { padding-top: 20px; }
  .hero-main, .hero-deck, .section-body, .evidence-margin, .figure-body { width: 100%; max-width: none; }
  .brand-row { align-items: flex-start; }
  h1 { font-size: 38px; line-height: 1.08; letter-spacing: 0; }
  html[lang^="zh"] h1 { font-size: 32px; }
  .subtitle { font-size: 18px; }
  .hero-findings { grid-template-columns: 1fr; }
  .hero-finding { min-height: auto; border-left: 0; border-top: 1px solid var(--hairline); padding-left: 0; padding-right: 0; }
  .section-body h2 { font-size: 24px; }
  .section-body p { font-size: 16px; }
  .section-body blockquote {
    grid-template-columns: 18px minmax(0, 1fr) 18px;
    column-gap: 12px;
    margin: 16px 0 18px;
    padding: 14px 14px;
  }
  .section-body blockquote::before,
  .section-body blockquote::after {
    font-size: 30px;
  }
  .section-body blockquote::after {
    margin-bottom: -4px;
  }
  .report-figure figcaption strong { font-size: 18px; line-height: 1.22; }
  .section-body th, .section-body td, .figure-body th, .figure-body td, .matrix-wrap th, .matrix-wrap td, .table-wrap th, .table-wrap td { padding: 12px 14px; }
  .report-quote { grid-template-columns: 1fr; }
  .report-quote blockquote, .report-quote cite { grid-column: 1 / -1; }
}
@media (max-width: 430px) {
  .hero-main, .hero-deck, .hero-findings, .section-body, .evidence-margin, .figure-body { max-width: none; }
  h1 { font-size: 34px; line-height: 1.08; }
  html[lang^="zh"] h1 { font-size: 30px; line-height: 1.12; }
  .subtitle { font-size: 20px; line-height: 1.28; }
}
@media print {
  body { background: var(--paper); }
  body::before { display: none; }
  .page { width: auto; margin: 0; box-shadow: none; border: 0; }
}
  </style>
</head>
<body>
  <main class="page" id="main-content">
    {{HERO}}
    {{BODY}}
    {{CLOSING}}
  </main>
  {{FOOTER}}
  <script>
    document.querySelectorAll('a[href]').forEach(function(link) {
      var href = link.getAttribute('href');
      if (!href || href.charAt(0) === '#') return;
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener noreferrer');
    });

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      var textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.top = '-1000px';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        return Promise.resolve();
      } catch (error) {
        return Promise.reject(error);
      } finally {
        document.body.removeChild(textarea);
      }
    }

    document.querySelectorAll('.section-body pre, .figure-body pre').forEach(function(pre) {
      if (pre.closest('.code-block')) return;
      var wrapper = document.createElement('div');
      wrapper.className = 'code-block';
      pre.parentNode.insertBefore(wrapper, pre);
      wrapper.appendChild(pre);

      var button = document.createElement('button');
      var copyLabel = document.documentElement.lang.indexOf('zh') === 0 ? '复制代码' : 'Copy code';
      var copiedLabel = document.documentElement.lang.indexOf('zh') === 0 ? '已复制' : 'Copied';
      button.type = 'button';
      button.className = 'code-copy';
      button.setAttribute('aria-label', copyLabel);
      button.innerHTML = '<svg class="copy-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="9" y="9" width="10" height="10" rx="1.8" stroke-width="1.8"></rect><path d="M6 15H5.8C4.8 15 4 14.2 4 13.2V5.8C4 4.8 4.8 4 5.8 4h7.4C14.2 4 15 4.8 15 5.8V6" stroke-width="1.8" stroke-linecap="round"></path></svg><svg class="check-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12.5l4.2 4.2L19 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>';
      wrapper.appendChild(button);

      button.addEventListener('click', function() {
        copyText(pre.innerText).catch(function() {
          return null;
        }).then(function() {
          window.clearTimeout(button.copyResetTimer);
          button.setAttribute('data-copied', 'true');
          button.setAttribute('aria-label', copiedLabel);
          button.copyResetTimer = window.setTimeout(function() {
            button.removeAttribute('data-copied');
            button.setAttribute('aria-label', copyLabel);
          }, 1400);
        });
      });
    });
  </script>
</body>
</html>
